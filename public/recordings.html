<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LAN-STREAM · Recordings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0c; --surface: #16161a; --surface-2: #1f1f24;
      --border: rgba(255,255,255,0.08); --text: #fff;
      --muted: rgba(255,255,255,0.5);
      --red: #ff3b30; --blue: #0a84ff; --green: #30d158;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh; padding: 32px 20px 80px;
    }
    .container { max-width: 1100px; margin: 0 auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .logo { font-size: 17px; font-weight: 700; }
    .logo a { color: inherit; text-decoration: none; }
    .logo span { color: var(--red); }
    .btn-link {
      padding: 7px 14px; border-radius: 18px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      text-decoration: none; cursor: pointer;
    }
    .btn-link:hover { background: var(--surface); }

    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .count-pill {
      display: inline-block; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 3px 10px; font-size: 12px; color: var(--muted);
      margin-left: 8px;
    }

    .empty {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 14px; padding: 60px 30px; text-align: center; color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-size: 17px; color: var(--text); font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; line-height: 1.5; }

    .recordings-list { display: flex; flex-direction: column; gap: 10px; }

    .rec-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      display: grid; grid-template-columns: 1fr auto;
      gap: 16px; align-items: center;
    }
    .rec-info { min-width: 0; }
    .rec-name {
      font-size: 14px; font-weight: 600; word-break: break-all;
      font-family: 'SF Mono', Menlo, monospace; margin-bottom: 4px;
    }
    .rec-meta {
      display: flex; gap: 14px; font-size: 12px; color: var(--muted);
      flex-wrap: wrap;
    }
    .rec-actions {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .rec-btn {
      padding: 7px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    }
    .rec-btn:hover { background: var(--surface-2); }
    .rec-btn.play { background: var(--blue); border-color: var(--blue); }
    .rec-btn.delete { color: var(--red); border-color: rgba(255,59,48,0.3); }
    .rec-btn.delete:hover { background: rgba(255,59,48,0.1); }

    /* Player modal */
    .modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      padding: 20px; cursor: pointer;
    }
    .modal.show { display: flex; }
    .modal-content {
      max-width: 1000px; width: 100%; cursor: default;
    }
    .modal video {
      width: 100%; max-height: 80vh;
      border-radius: 8px; background: #000;
    }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    @media (max-width: 600px) {
      .rec-item { grid-template-columns: 1fr; }
      .rec-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo"><a href="/">LAN<span>-</span>STREAM</a> · Recordings</div>
    <div style="display: flex; gap: 8px;">
      <a class="btn-link" href="/view.html">🖥️ Live View</a>
      <a class="btn-link" href="/broadcast.html">📱 Broadcast</a>
    </div>
  </header>

  <h1>Recordings <span class="count-pill" id="count">0 files</span></h1>
  <div class="sub">Stored on the server — playable, downloadable, deletable.</div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">💾</div>
      <div class="empty-title">No recordings yet</div>
      <div class="empty-sub">Start a broadcast and trigger a recording from the broadcaster or any viewer.</div>
    </div>
  </div>

</div>

<!-- Player Modal -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-content" onclick="event.stopPropagation()">
    <video id="modalVideo" controls autoplay></video>
  </div>
</div>

<script>
  let recordings = [];

  async function load() {
    try {
      const r = await fetch('/api/recordings');
      recordings = await r.json();
      render();
    } catch (e) {
      console.error(e);
    }
  }

  function render() {
    document.getElementById('count').textContent = `${recordings.length} file${recordings.length !== 1 ? 's' : ''}`;
    const c = document.getElementById('content');
    if (recordings.length === 0) {
      c.innerHTML = `
        <div class="empty">
          <div class="empty-icon">💾</div>
          <div class="empty-title">No recordings yet</div>
          <div class="empty-sub">Start a broadcast and trigger a recording from the broadcaster or any viewer.</div>
        </div>`;
      return;
    }
    const list = document.createElement('div');
    list.className = 'recordings-list';
    recordings.forEach(rec => {
      const div = document.createElement('div');
      div.className = 'rec-item';
      div.innerHTML = `
        <div class="rec-info">
          <div class="rec-name">${escapeHtml(rec.filename)}</div>
          <div class="rec-meta">
            <span>📦 ${formatSize(rec.size)}</span>
            <span>📅 ${new Date(rec.modifiedAt).toLocaleString()}</span>
          </div>
        </div>
        <div class="rec-actions">
          <button class="rec-btn play" onclick="play('${rec.url}')">▶ Play</button>
          <a class="rec-btn" href="${rec.url}" download>⬇ Download</a>
          <button class="rec-btn delete" onclick="del('${rec.filename}')">🗑</button>
        </div>
      `;
      list.appendChild(div);
    });
    c.innerHTML = '';
    c.appendChild(list);
  }

  function play(url) {
    const v = document.getElementById('modalVideo');
    v.src = url;
    document.getElementById('modal').classList.add('show');
  }

  function closeModal(e) {
    if (e && e.target.id !== 'modal' && !e.target.classList.contains('modal-close')) {
      // Only close if clicking backdrop or close button
      if (e.target.tagName !== 'BUTTON') return;
    }
    const v = document.getElementById('modalVideo');
    v.pause(); v.src = '';
    document.getElementById('modal').classList.remove('show');
  }

  async function del(filename) {
    if (!confirm(`Delete ${filename}?`)) return;
    const r = await fetch(`/api/recordings/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (r.ok) load();
    else alert('Delete failed');
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  load();
  setInterval(load, 3000);
</script>
</body>
</html>
